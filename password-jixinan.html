<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码提示 - BEYONDSOUND 音乐库</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .password-container {
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            background-color: var(--bg-secondary);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            text-align: center;
        }
        
        .password-title {
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--text-primary);
        }
        
        .password-info {
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .password-box {
            background-color: var(--bg-primary);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 30px;
            position: relative;
        }
        
        .password-text {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-color);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        
        .copy-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .copy-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .confirm-btn {
            background-color: var(--accent-color);
            color: var(--text-primary);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .confirm-btn:hover {
            background-color: #1ed760;
            transform: scale(1.05);
        }
        
        .back-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .copy-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }
        
        .copy-notification.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <h1>beyond the sound 音乐库</h1>
            </div>
            <nav class="navbar-nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="artist4.html" class="nav-link">万能青年旅店</a>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="搜索音乐人、专辑或歌曲...">
                    <div id="search-results" class="search-results"></div>
                </div>
                <a href="#" class="nav-link">关于我们</a>
            </nav>
            <button class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main>
        <div class="password-container">
            <h2 class="password-title">访问资源密码</h2>
            <div class="password-info">
                <p>请使用以下密码访问《冀西南林路行》专辑资源</p>
                <p>点击密码可自动复制到剪贴板</p>
            </div>
            <div class="password-box">
                <div class="password-text" id="password">JkVv</div>
                <button class="copy-btn" onclick="copyPassword()">复制密码</button>
            </div>
            <div class="button-group">
                <button class="confirm-btn" onclick="redirectToResource()">确认访问</button>
                <button class="back-btn" onclick="window.location.href='album-jixinan.html'">返回专辑</button>
            </div>
        </div>
    </main>

    <div class="copy-notification" id="copyNotification">密码已复制到剪贴板</div>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 BEYONDSOUND 音乐库</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        function copyPassword() {
            const password = document.getElementById('password').textContent;
            navigator.clipboard.writeText(password).then(() => {
                const notification = document.getElementById('copyNotification');
                notification.classList.add('show');
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 2000);
            });
        }
        
        function redirectToResource() {
            window.open('https://pan.quark.cn/s/e98ae71bc35e#/list/share', '_blank');
        }
    </script>
</body>
</html>
