<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问密码 - BEYONDSOUND 音乐库</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .password-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .password-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 40px;
            color: #1db954;
        }
        .password-content {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 60px;
            color: #fff;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
        }
        .password-content:hover {
            color: #1db954;
            transform: scale(1.05);
        }
        .redirect-btn {
            background-color: #1db954;
            color: #fff;
            border: none;
            border-radius: 500px;
            padding: 16px 48px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .redirect-btn:hover {
            background-color: #1ed760;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <h1>beyond the sound 音乐库</h1>
            </div>
            <nav class="navbar-nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="aboutman.html" class="nav-link">返回专辑</a>
            </nav>
        </div>
    </header>

    <main class="password-page">
        <h1 class="password-title">访问密码 <small style="font-size: 1rem; font-weight: normal; color: #aaa;">（点击密码可自动复制）</small></h1>
        <div class="password-content" onclick="copyToClipboard(this)">9sli</div>
        <button class="redirect-btn" onclick="window.open('https://wwavd.lanzoum.com/b0139kocyf', '_blank')">跳转到下载链接</button>
    </main>
    
    <script>
        function copyToClipboard(element) {
            const text = element.textContent;
            navigator.clipboard.writeText(text).then(function() {
                // 显示复制成功提示
                const originalText = element.textContent;
                element.textContent = '已复制!';
                element.style.color = '#1db954';
                setTimeout(function() {
                    element.textContent = originalText;
                    element.style.color = '#fff';
                }, 2000);
            }).catch(function(err) {
                console.error('复制失败:', err);
            });
        }
    </script>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 BEYONDSOUND 音乐库</p>
        </div>
    </footer>
</body>
</html>
